<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 阶段性测试 - 刷题系统</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card-bg: #fff;
    --primary: #1677ff;
    --success: #52c41a;
    --danger: #ff4d4f;
    --warning: #faad14;
    --text: #1a1a2e;
    --text-secondary: #666;
    --border: #e8e8e8;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 12px;
    --tag-bg: #e6f4ff;
    --tag-color: #1677ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 .icon { font-size: 22px; }
  .header-info {
    font-size: 13px;
    opacity: 0.85;
  }

  /* Main */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Progress Bar */
  .progress-section {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-title { font-size: 14px; font-weight: 600; }
  .progress-stats { font-size: 13px; color: var(--text-secondary); }
  .progress-bar {
    height: 8px;
    background: #e8e8e8;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #4096ff);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Category Tabs */
  .category-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .category-tab {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .category-tab:hover { border-color: var(--primary); color: var(--primary); }
  .category-tab.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* Question Card */
  .question-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    border-left: 4px solid transparent;
  }
  .question-card.correct { border-left-color: var(--success); }
  .question-card.wrong { border-left-color: var(--danger); }
  .question-card.current { box-shadow: 0 4px 20px rgba(22,119,255,0.12); border-left-color: var(--primary); }

  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    gap: 12px;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .q-type-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    background: var(--tag-bg);
    color: var(--tag-color);
  }
  .q-score {
    font-size: 12px;
    color: var(--text-secondary);
  }
  .q-number {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .q-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.7;
  }
  .q-code {
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 14px 16px;
    border-radius: 8px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.7;
    overflow-x: auto;
    margin: 10px 0 16px;
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Options */
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    line-height: 1.5;
  }
  .option-item:hover { border-color: var(--primary); background: #f0f7ff; }
  .option-item.selected { border-color: var(--primary); background: #e6f4ff; }
  .option-item.correct-answer { border-color: var(--success); background: #f6ffed; }
  .option-item.wrong-answer { border-color: var(--danger); background: #fff2f0; }
  .option-item.disabled { pointer-events: none; opacity: 0.8; }
  .option-key {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px;
    flex-shrink: 0;
  }
  .option-item.selected .option-key { background: var(--primary); color: #fff; }
  .option-item.correct-answer .option-key { background: var(--success); color: #fff; }
  .option-item.wrong-answer .option-key { background: var(--danger); color: #fff; }

  /* Fill-in answer area */
  .fill-input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    transition: border-color 0.2s;
    resize: vertical;
    min-height: 50px;
  }
  .fill-input:focus {
    outline: none;
    border-color: var(--primary);
  }

  /* Essay area */
  .essay-input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    resize: vertical;
    min-height: 100px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .essay-input:focus {
    outline: none;
    border-color: var(--primary);
  }

  /* Explanation */
  .explanation-box {
    margin-top: 14px;
    padding: 14px 16px;
    background: #fffbe6;
    border-radius: 8px;
    border: 1px solid #ffe58f;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }
  .explanation-box.show { display: block; }
  .explanation-box .exp-title {
    font-weight: 600;
    color: #d48806;
    margin-bottom: 4px;
  }
  .explanation-box .exp-content { color: #555; }

  .ref-answer {
    margin-top: 10px;
    padding: 12px 14px;
    background: #f6ffed;
    border-radius: 8px;
    border: 1px solid #b7eb8f;
    font-size: 14px;
    display: none;
  }
  .ref-answer.show { display: block; }
  .ref-answer .ref-title {
    font-weight: 600;
    color: #389e0d;
    margin-bottom: 4px;
  }

  /* Buttons */
  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #4096ff; }
  .btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
  .btn-outline:hover { background: #f0f7ff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #73d13d; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }

  .btn-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  /* Bottom nav */
  .bottom-nav {
    position: sticky;
    bottom: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
  }
  .bottom-nav-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .bottom-nav .btn { flex: 1; justify-content: center; max-width: 200px; }

  /* Score Modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    display: none;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 32px 28px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }
  .modal .score-big {
    font-size: 56px;
    font-weight: 700;
    color: var(--primary);
    margin: 16px 0;
  }
  .modal .score-detail {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 12px 0 20px;
    font-size: 14px;
  }
  .modal .score-detail span { color: var(--text-secondary); }
  .modal .score-detail strong { display: block; font-size: 20px; color: var(--text); }

  /* Filter empty */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  /* Responsive */
  @media (max-width: 480px) {
    .header h1 { font-size: 16px; }
    .q-title { font-size: 15px; }
    .option-item { font-size: 14px; padding: 10px 12px; }
    .bottom-nav .btn { max-width: 150px; font-size: 14px; padding: 10px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><span class="icon">🐍</span>Python 阶段性测试二</h1>
    <div class="header-info">阶段测试二 · 33题 · 100分</div>
  </div>
</div>

<div class="container">
  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title">📊 答题进度</span>
      <span class="progress-stats" id="progressStats">0 / 28 题已完成</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="category-tabs" id="categoryTabs"></div>
  </div>

  <!-- Question list -->
  <div id="questionList"></div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">🎉</div>
    <p>当前分类没有题目</p>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav" id="bottomNav" style="display:none">
  <div class="bottom-nav-inner">
    <button class="btn btn-outline btn-sm" onclick="resetCurrent()">🔄 重做本题</button>
    <button class="btn btn-primary" onclick="submitAll()">📝 提交全部并评分</button>
  </div>
</div>

<!-- Score Modal -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal">
    <h2>📋 测试结果</h2>
    <div class="score-big" id="totalScore">0</div>
    <div style="color:var(--text-secondary)">得分</div>
    <div class="score-detail">
      <div>✅ <strong id="correctCount">0</strong><span>正确</span></div>
      <div>❌ <strong id="wrongCount">0</strong><span>错误</span></div>
      <div>⬜ <strong id="unansweredCount">0</strong><span>未答</span></div>
    </div>
    <button class="btn btn-primary" onclick="closeModal()" style="width:100%">关闭查看详情</button>
  </div>
</div>

<script src="questions.js"></script>
<script>
// ===== App State =====
const app = {
  currentCategory: 'all',
  userAnswers: {},
  showAnswers: false,
  scoreResult: null
};

// Load from localStorage
try {
  const saved = JSON.parse(localStorage.getItem('pythonQuiz_answers') || '{}');
  if (saved && typeof saved === 'object') {
    app.userAnswers = saved;
  }
} catch(e) {}

// ===== Init =====
function init() {
  renderCategoryTabs();
  renderQuestions();
}

function getFilteredQuestions() {
  if (app.currentCategory === 'all') return questionBank;
  if (app.currentCategory === 'single') return questionBank.filter(q => q.type === 'single');
  if (app.currentCategory === 'multiple') return questionBank.filter(q => q.type === 'multiple');
  if (app.currentCategory === 'fill') return questionBank.filter(q => q.type === 'fill');
  if (app.currentCategory === 'essay') return questionBank.filter(q => q.type === 'essay' && q.category === '简答题');
  if (app.currentCategory === 'code') return questionBank.filter(q => q.type === 'essay' && q.category === '编程题');
  return questionBank;
}

function getCategoryLabel(cat) {
  const map = {
    'all': '全部(33)',
    'single': '单选题(10)',
    'multiple': '多选题(6)',
    'fill': '程序理解(8)',
    'essay': '简答题(6)',
    'code': '编程题(3)'
  };
  return map[cat] || cat;
}

function renderCategoryTabs() {
  const cats = ['all', 'single', 'multiple', 'fill', 'essay', 'code'];
  const container = document.getElementById('categoryTabs');
  container.innerHTML = cats.map(cat =>
    `<button class="category-tab ${app.currentCategory === cat ? 'active' : ''}" onclick="switchCategory('${cat}')">${getCategoryLabel(cat)}</button>`
  ).join('');
}

function switchCategory(cat) {
  app.currentCategory = cat;
  renderCategoryTabs();
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuestions() {
  const questions = getFilteredQuestions();
  const listEl = document.getElementById('questionList');
  const emptyEl = document.getElementById('emptyState');

  if (questions.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    document.getElementById('bottomNav').style.display = 'none';
    updateProgress();
    return;
  }
  emptyEl.style.display = 'none';
  document.getElementById('bottomNav').style.display = 'block';

  listEl.innerHTML = questions.map(q => renderQuestion(q)).join('');

  // Attach event listeners
  questions.forEach(q => {
    if (q.type === 'single' || q.type === 'multiple') {
      q.options.forEach(opt => {
        const el = document.getElementById(`opt-${q.id}-${opt.key}`);
        if (el && !app.showAnswers) {
          el.addEventListener('click', () => selectOption(q, opt.key));
        }
      });
    }
    if (q.type === 'fill') {
      const el = document.getElementById(`fill-${q.id}`);
      if (el) {
        el.addEventListener('input', () => {
          app.userAnswers[q.id] = el.value.trim();
          saveState();
        });
      }
    }
    if (q.type === 'essay') {
      const el = document.getElementById(`essay-${q.id}`);
      if (el) {
        el.addEventListener('input', () => {
          app.userAnswers[q.id] = el.value.trim();
          saveState();
        });
      }
    }
  });

  updateProgress();
}

function renderQuestion(q) {
  let stateClass = '';
  if (app.showAnswers && app.scoreResult) {
    const r = app.scoreResult.details[q.id];
    if (r) {
      stateClass = r.correct ? 'correct' : 'wrong';
    }
  }

  let html = `<div class="question-card ${stateClass}" id="qcard-${q.id}">`;

  // Header
  html += `<div class="q-header">
    <span class="q-number">#${q.id}</span>
    <div class="q-meta">
      <span class="q-type-tag">${q.category}</span>
      <span class="q-score">${q.score}分</span>
    </div>
  </div>`;

  // Question text
  html += `<div class="q-title">${q.question.replace(/\n/g, '<br>')}</div>`;

  // Code block (if question contains program code)
  // Already embedded in question text via <br>

  // Options
  if (q.type === 'single' || q.type === 'multiple') {
    const userAns = app.userAnswers[q.id];
    const userSet = Array.isArray(userAns) ? userAns : (userAns ? [userAns] : []);
    const correctSet = Array.isArray(q.answer) ? q.answer : [q.answer];

    html += `<div class="options-list">`;
    q.options.forEach(opt => {
      let optClass = '';
      if (app.showAnswers && app.scoreResult) {
        if (correctSet.includes(opt.key) && userSet.includes(opt.key)) optClass = 'correct-answer';
        else if (correctSet.includes(opt.key)) optClass = 'correct-answer';
        else if (userSet.includes(opt.key)) optClass = 'wrong-answer';
      } else if (userSet.includes(opt.key)) {
        optClass = 'selected';
      }
      const disabled = app.showAnswers ? 'disabled' : '';
      html += `<div class="option-item ${optClass} ${disabled}" id="opt-${q.id}-${opt.key}">
        <span class="option-key">${opt.key}</span>
        <span>${opt.text}</span>
      </div>`;
    });
    html += `</div>`;
    if (q.type === 'multiple') {
      html += `<div style="font-size:12px;color:var(--text-secondary);margin-top:8px;">💡 多选题，点击多个选项进行选择</div>`;
    }
  }

  // Fill-in
  if (q.type === 'fill') {
    const val = app.userAnswers[q.id] || '';
    html += `<input type="text" class="fill-input" id="fill-${q.id}" 
      value="${escapeHtml(val)}" placeholder="请输入程序输出结果..."
      ${app.showAnswers ? 'disabled' : ''}>`;
  }

  // Essay
  if (q.type === 'essay') {
    const val = app.userAnswers[q.id] || '';
    html += `<textarea class="essay-input" id="essay-${q.id}" 
      placeholder="请输入你的答案..." ${app.showAnswers ? 'disabled' : ''}>${escapeHtml(val)}</textarea>`;
  }

  // Show answer result
  if (app.showAnswers && app.scoreResult) {
    const r = app.scoreResult.details[q.id];
    if (r) {
      const icon = r.correct ? '✅' : '❌';
      html += `<div style="margin-top:12px;font-size:14px;font-weight:600;color:${r.correct ? 'var(--success)' : 'var(--danger)'}">${icon} ${r.correct ? '回答正确' : '回答错误'} (+${r.score}/${q.score}分)</div>`;
      if (!r.correct) {
        const ansText = Array.isArray(q.answer) ? q.answer.join(', ') : q.answer;
        html += `<div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">正确答案：${ansText}</div>`;
      }
    }
  }

  // Explanation (always visible after submit, or can toggle)
  if (app.showAnswers && q.explanation) {
    html += `<div class="explanation-box show">
      <div class="exp-title">💡 解析</div>
      <div class="exp-content">${q.explanation}</div>
    </div>`;
  }

  // Reference answer for essay
  if (app.showAnswers && q.type === 'essay' && q.referenceAnswer) {
    html += `<div class="ref-answer show">
      <div class="ref-title">📖 参考答案</div>
      <div>${q.referenceAnswer}</div>`;
    if (q.keyPoints && q.keyPoints.length > 0) {
      html += `<div style="margin-top:6px;font-size:13px;color:var(--text-secondary);">
        <strong>关键点：</strong>${q.keyPoints.join('；')}
      </div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function selectOption(q, key) {
  if (app.showAnswers) return;

  if (q.type === 'single') {
    app.userAnswers[q.id] = key;
  } else if (q.type === 'multiple') {
    let current = app.userAnswers[q.id];
    if (!Array.isArray(current)) current = [];
    const idx = current.indexOf(key);
    if (idx >= 0) {
      current.splice(idx, 1);
    } else {
      current.push(key);
    }
    current.sort();
    app.userAnswers[q.id] = current;
  }
  saveState();
  renderQuestions();
}

function saveState() {
  try {
    localStorage.setItem('pythonQuiz_answers', JSON.stringify(app.userAnswers));
  } catch(e) {}
}

function updateProgress() {
  const questions = getFilteredQuestions();
  const total = questions.length;
  let answered = 0;
  questions.forEach(q => {
    const ans = app.userAnswers[q.id];
    if (ans !== undefined && ans !== null && ans !== '' && 
        (!Array.isArray(ans) || ans.length > 0)) {
      answered++;
    }
  });
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  document.getElementById('progressStats').textContent = `${answered} / ${total} 题已完成`;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

function resetCurrent() {
  const questions = getFilteredQuestions();
  questions.forEach(q => {
    delete app.userAnswers[q.id];
  });
  app.showAnswers = false;
  app.scoreResult = null;
  saveState();
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function submitAll() {
  // Calculate score
  const questions = questionBank;
  let totalScore = 0;
  let earnedScore = 0;
  let correctCount = 0;
  let wrongCount = 0;
  let unansweredCount = 0;
  const details = {};

  questions.forEach(q => {
    totalScore += q.score;
    const userAns = app.userAnswers[q.id];

    if (userAns === undefined || userAns === null || userAns === '' ||
        (Array.isArray(userAns) && userAns.length === 0)) {
      unansweredCount++;
      details[q.id] = { correct: false, score: 0 };
      return;
    }

    let isCorrect = false;
    if (q.type === 'single') {
      isCorrect = userAns === q.answer;
    } else if (q.type === 'multiple') {
      const correctSet = [...q.answer].sort().join(',');
      const userSet = [...userAns].sort().join(',');
      isCorrect = correctSet === userSet;
    } else if (q.type === 'fill') {
      // Fuzzy match for fill-in
      const ua = String(userAns).replace(/\s+/g, '').replace(/[\[\]'"\s]/g, '').toLowerCase();
      const ca = String(q.answer).replace(/\s+/g, '').replace(/[\[\]'"\s]/g, '').toLowerCase();
      isCorrect = ua === ca;
    } else if (q.type === 'essay') {
      // Essay: mark as "pending" — give half credit as placeholder
      isCorrect = false;
      details[q.id] = { correct: false, score: 0, essay: true };
      return; // skip score for essay
    }

    if (isCorrect) {
      correctCount++;
      earnedScore += q.score;
      details[q.id] = { correct: true, score: q.score };
    } else {
      wrongCount++;
      details[q.id] = { correct: false, score: 0 };
    }
  });

  app.scoreResult = {
    totalScore,
    earnedScore,
    correctCount,
    wrongCount,
    unansweredCount,
    details
  };
  app.showAnswers = true;

  renderQuestions();
  updateProgress();

  // Show modal
  document.getElementById('totalScore').textContent = earnedScore;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount + (app.scoreResult.unansweredCount || 0);
  document.getElementById('unansweredCount').textContent = app.scoreResult.unansweredCount || 0;
  document.getElementById('scoreModal').classList.add('show');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeModal() {
  document.getElementById('scoreModal').classList.remove('show');
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
init();
</script>
